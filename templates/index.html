<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
    font-family: Arial;
    background: #0f0f0f;
    color: white;
    padding: 10px;
}

h2 {
    text-align: center;
    margin-bottom: 5px;
}

p {
    text-align: center;
    opacity: 0.6;
    margin-top: 0;
}

.card {
    max-width: 420px;
    margin: auto;
    background: #1c1c1c;
    padding: 20px;
    border-radius: 16px;
}

input, select {
    width: 100%;
    padding: 14px;
    margin: 8px 0;
    border-radius: 10px;
    border: none;
    background: #2a2a2a;
    color: white;
    font-size: 15px;
}

input:focus, select:focus {
    outline: 2px solid #00c853;
}

button.submit {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, #00c853, #00e676);
    border: none;
    color: white;
    font-size: 16px;
    border-radius: 12px;
    margin-top: 10px;
    font-weight: bold;
    cursor: pointer;
}

.slots {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin: 10px 0;
}

.slot-btn {
    padding: 10px 12px;
    border-radius: 20px;
    border: 1px solid #444;
    background: transparent;
    color: white;
    cursor: pointer;
    transition: 0.2s;
}

.slot-btn:hover {
    background: #00c853;
    border-color: #00c853;
}

.slot-btn.selected {
    background: #00c853;
    border-color: #00c853;
}

label {
    font-size: 14px;
    opacity: 0.8;
}
</style>
</head>

<body>

<div class="card">

<h2>💈 Book Appointment</h2>
<p>Fast • Simple • Instant booking</p>

<form method="POST">

<input name="name" placeholder="Όνομα" required>
<input name="phone" placeholder="Τηλέφωνο" required>

<select name="service" required>
    <option value="">Επιλογή υπηρεσίας</option>
    {% for s in services %}
        <option value="{{ s }}">{{ s }}</option>
    {% endfor %}
</select>

<!-- 📅 DATE -->
<label>📅 Ημερομηνία</label>
<input type="date" name="date" required>

<!-- 🕒 SLOTS -->
<label>🕒 Ώρα</label>

<div class="slots">
{% for s in slots %}
    <button type="button" class="slot-btn" onclick="selectTime('{{ s }}', this)">
        {{ s }}
    </button>
{% endfor %}
</div>

<input type="hidden" name="time" id="timeInput">

<button type="submit" class="submit">💈 Κλείσε ραντεβού</button>

</form>

</div>

<script>
function selectTime(time, el){
    document.getElementById("timeInput").value = time;

    document.querySelectorAll(".slot-btn").forEach(b => {
        b.classList.remove("selected");
    });

    el.classList.add("selected");
}
</script>

</body>
</html>
