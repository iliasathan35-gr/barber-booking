<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
    font-family: Arial;
    background: #111;
    color: white;
    padding: 10px;
}

h2 {
    text-align: center;
}

form {
    max-width: 400px;
    margin: auto;
}

input, select {
    width: 100%;
    padding: 12px;
    margin: 8px 0;
    font-size: 16px;
    border-radius: 8px;
    border: none;
}

button {
    width: 100%;
    padding: 14px;
    background: #00c853;
    border: none;
    color: white;
    font-size: 16px;
    border-radius: 8px;
    margin-top: 10px;
}

.slots {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin: 10px 0;
}

.slot {
    padding: 8px;
    background: #333;
    border-radius: 8px;
    font-size: 12px;
}
</style>

</head>

<body>

<h2>💈 Κλείσε Ραντεβού</h2>

<form method="POST">

<input name="name" placeholder="Όνομα" required>
<input name="phone" placeholder="Τηλέφωνο" required>

<select name="service" required>
    <option value="">Επιλογή υπηρεσίας</option>
    {% for s in services %}
        <option value="{{ s }}">{{ s }}</option>
    {% endfor %}
</select>

<input type="date" name="date" required>
<input type="time" name="time" required>

<h3>🕒 Ώρες (ενδεικτικές)</h3>

<div class="slots">
{% for s in slots %}
    <div class="slot">{{ s }}</div>
{% endfor %}
</div>

<!-- 🔥 ΜΟΝΟ ΑΥΤΟ κάνει submit -->
<button type="submit">💈 Κλείσε ραντεβού</button>

</form>

</body>
</html>
