<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #111;
    color: white;
}

/* container */
.container {
    padding: 20px;
}

/* title */
h2 {
    text-align: center;
    font-size: 28px;
}

/* inputs */
input, select {
    width: 100%;
    font-size: 20px;
    padding: 15px;
    margin: 10px 0;
    border-radius: 10px;
    border: none;
}

/* services */
select {
    background: #222;
    color: white;
}

/* days (swipe) */
#days {
    display: flex;
    overflow-x: auto;
    gap: 10px;
    margin: 15px 0;
}

.day-btn {
    min-width: 110px;
    padding: 15px;
    font-size: 16px;
    border-radius: 10px;
    border: none;
    background: #333;
    color: white;
}

.day-btn.active {
    background: #00c853;
}

/* time buttons */
#times {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-top: 10px;
}

.time-btn {
    padding: 15px;
    font-size: 18px;
    border-radius: 10px;
    border: none;
    background: #333;
    color: white;
}

.time-btn.active {
    background: #00c853;
}

/* button */
button.submit {
    width: 100%;
    font-size: 22px;
    padding: 18px;
    margin-top: 20px;
    background: #00c853;
    color: white;
    border: none;
    border-radius: 12px;
}
</style>
</head>

<body>

<div class="container">

<h2>💈 Κλείσε Ραντεβού</h2>

<form method="POST">

<input name="name" placeholder="Ονοματεπώνυμο" required>
<input name="phone" placeholder="Τηλέφωνο" required>

<select name="service">
{% for s in services %}
<option>{{ s }}</option>
{% endfor %}
</select>

<!-- DAYS -->
<div id="days"></div>
<input type="hidden" name="date" id="selectedDate" required>

<!-- TIMES -->
<div id="times">
{% for t in slots %}
<button type="button" class="time-btn" onclick="selectTime(event, '{{ t }}')">
{{ t }}
</button>
{% endfor %}
</div>

<input type="hidden" name="time" id="selectedTime" required>

<button class="submit">ΚΛΕΙΣΕ ΡΑΝΤΕΒΟΥ</button>

</form>

</div>

<script>
// SELECT TIME
function selectTime(e, t) {
    document.getElementById("selectedTime").value = t;

    document.querySelectorAll(".time-btn").forEach(b => b.classList.remove("active"));
    e.target.classList.add("active");
}

// CREATE DAYS (7 days swipe)
const daysDiv = document.getElementById("days");

for (let i = 0; i < 7; i++) {
    let d = new Date();
    d.setDate(d.getDate() + i);

    let dateStr = d.toISOString().split("T")[0];

    let btn = document.createElement("button");
    btn.innerText = dateStr;
    btn.className = "day-btn";

    btn.onclick = () => {
        document.getElementById("selectedDate").value = dateStr;

        document.querySelectorAll(".day-btn").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
    };

    daysDiv.appendChild(btn);
}
</script>

</body>
</html>
