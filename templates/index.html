<!DOCTYPE html>
<html>
<head>
    <title>Barber Shop</title>
    <style>
        body { font-family: Arial; text-align: center; }
        input, select, button { padding: 10px; margin: 10px; width: 200px; }
        button { background: black; color: white; }
    </style>
</head>
<body>

<h1>Κλείσε Ραντεβού 💈</h1>

<form method="POST">
    <input name="name" placeholder="Όνομα" required><br>
    <input name="phone" placeholder="Τηλέφωνο" required><br>

    <select name="service">
        {% for s in services %}
        <option>{{ s }}</option>
        {% endfor %}
    </select><br>

    <input type="datetime-local" name="time" required><br>

    <button>Κλείσε</button>
</form>

</body>
</html>
