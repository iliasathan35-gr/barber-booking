<h2>Book Appointment 💈</h2>

<form method="POST">
    <input name="name" placeholder="Όνομα">
    <input name="phone" placeholder="Τηλέφωνο">

    <select name="service">
        {% for s in services %}
        <option>{{ s }}</option>
        {% endfor %}
    </select>

    <input type="date" name="date">

    <select name="time">
        {% for s in slots %}
        <option>{{ s }}</option>
        {% endfor %}
    </select>

    <button>Κράτηση</button>
</form>
