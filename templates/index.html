<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
    font-family: Arial;
    background: #111;
    color: white;
    padding: 10px;
}

h2 {
    text-align: center;
}

form {
    max-width: 400px;
    margin: auto;
}

input, select {
    width: 100%;
    padding: 12px;
    margin: 8px 0;
    border-radius: 8px;
    border: none;
    font-size: 16px;
}

button.submit {
    width: 100%;
    padding: 14px;
    background: #00c853;
    border: none;
    color: white;
    font-size: 16px;
    border-radius: 8px;
    margin-top: 10px;
}

.date-btn {
    width: 100%;
    padding: 12px;
    border-radius: 8px;
    border: none;
    background: white;
    color: black;
    font-size: 16px;
    text-align: left;
    margin: 8px 0;
}

.slots {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin: 10px 0;
}

.slot-btn {
    padding: 10px;
    background: #333;
    border-radius: 8px;
    cursor: pointer;
    border: none;
    color: white;
}

.slot-btn.selected {
    background: #00c853;
}
</style>
</head>

<body>

<h2>💈 Κλείσε Ραντεβού</h2>

<form method="POST">

<input name="name" placeholder="Όνομα" required>
<input name="phone" placeholder="Τηλέφωνο" required>

<select name="service" required>
    <option value="">Επιλογή υπηρεσίας</option>
    {% for s in services %}
        <option value="{{ s }}">{{ s }}</option>
    {% endfor %}
</select>

<!-- 🔥 DATE BUTTON -->
<label>📅 Ημερομηνία</label>

<button type="button" class="date-btn" onclick="openDate()" id="dateBtn">
    📅 Επίλεξε ημερομηνία
</button>

<input type="date" name="date" id="realDate" required style="display:none;">

<!-- 🔥 HOURS -->
<h3>🕒 Διάλεξε Ώρα</h3>

<div class="slots">
{% for s in slots %}
    <button type="button" class="slot-btn" onclick="selectTime('{{ s }}', this)">
        {{ s }}
    </button>
{% endfor %}
</div>

<input type="hidden" name="time" id="timeInput">

<button type="submit" class="submit">💈 Κλείσε ραντεβού</button>

</form>

<script>
function openDate(){
    let input = document.getElementById("realDate");

    if (input.showPicker) {
        input.showPicker();
    } else {
        input.click();
    }

    input.onchange = function(){
        document.getElementById("dateBtn").innerText = "📅 " + input.value;
    }
}

function selectTime(time, el){
    document.getElementById("timeInput").value = time;

    document.querySelectorAll(".slot-btn").forEach(b => {
        b.classList.remove("selected");
    });

    el.classList.add("selected");
}
</script>

</body>
</html>
