<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
    font-family: Arial;
    background: #111;
    color: white;
    padding: 10px;
}

form {
    max-width: 400px;
    margin: auto;
}

input, select {
    width: 100%;
    padding: 12px;
    margin: 8px 0;
    border-radius: 8px;
    border: none;
    font-size: 16px;
}

button {
    width: 100%;
    padding: 14px;
    background: #00c853;
    border: none;
    color: white;
    font-size: 16px;
    border-radius: 8px;
}

.slots {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin: 10px 0;
}

.slot-btn {
    padding: 10px;
    background: #333;
    border-radius: 8px;
    cursor: pointer;
    border: none;
    color: white;
}

.slot-btn.selected {
    background: #00c853;
}

</style>

</head>

<body>

<h2>💈 Κλείσε Ραντεβού</h2>

<form method="POST" id="bookingForm">

<input name="name" placeholder="Όνομα" required>
<input name="phone" placeholder="Τηλέφωνο" required>

<select name="service" required>
    <option value="">Επιλογή υπηρεσίας</option>
    {% for s in services %}
        <option value="{{ s }}">{{ s }}</option>
    {% endfor %}
</select>

<input type="date" name="date" required>

<h3>🕒 Διάλεξε Ώρα</h3>

<div class="slots">
{% for s in slots %}
    <button type="button" class="slot-btn" onclick="selectTime('{{ s }}', this)">
        {{ s }}
    </button>
{% endfor %}
</div>

<!-- hidden field -->
<input type="hidden" name="time" id="timeInput">

<button type="submit">💈 Κλείσε ραντεβού</button>

</form>

<script>
function selectTime(time, el) {
    document.getElementById("timeInput").value = time;

    // reset buttons
    document.querySelectorAll(".slot-btn").forEach(b => {
        b.classList.remove("selected");
    });

    el.classList.add("selected");
}
</script>

</body>
</html>
