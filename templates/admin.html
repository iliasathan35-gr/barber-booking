<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
    font-family: Arial;
    background: #111;
    color: white;
    padding: 10px;
}

.day {
    padding: 12px;
    margin-bottom: 10px;
    background: #1c1c1c;
    border-radius: 10px;
    cursor: pointer;
}

.day:hover {
    background: #2a2a2a;
}

.box {
    display: none;
    margin-top: 10px;
}

.item {
    background: #2a2a2a;
    padding: 10px;
    border-radius: 8px;
    margin-bottom: 6px;
}

button {
    padding: 5px 8px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
}

.delete {
    background: red;
    color: white;
}
</style>
</head>

<body>

<h2>📅 Admin Panel</h2>
<a href="/logout">Logout</a>

{% for day in days %}

<div class="day" onclick="toggle('{{ loop.index }}')">
    📆 {{ day.date }} ({{ day.bookings|length }} ραντεβού)

    <div class="box" id="box{{ loop.index }}">

        {% if day.bookings %}

            {% for b in day.bookings %}
            <div class="item">

                <b>{{ b.time }}</b><br>
                {{ b.name }} - {{ b.phone }}<br>
                {{ b.service }}

                <br><br>

                <a href="/admin/delete/{{ b.index }}">
                    <button class="delete">❌ Delete</button>
                </a>

            </div>
            {% endfor %}

        {% else %}
            <p>❌ Κανένα ραντεβού</p>
        {% endif %}

    </div>
</div>

{% endfor %}

<script>
function toggle(id){
    let box = document.getElementById("box"+id);
    box.style.display = (box.style.display === "block") ? "none" : "block";
}
</script>

</body>
</html>
