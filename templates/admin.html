<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
    font-family: Arial;
    background: #111;
    color: white;
    padding: 10px;
}

h2 {
    text-align: center;
}

a {
    color: white;
}

.day {
    background: #1c1c1c;
    padding: 12px;
    margin-bottom: 10px;
    border-radius: 10px;
    cursor: pointer;
}

.day:hover {
    background: #2a2a2a;
}

.box {
    display: none;
    margin-top: 10px;
}

.item {
    background: #2a2a2a;
    padding: 10px;
    border-radius: 8px;
    margin-bottom: 8px;
}

input, select {
    padding: 6px;
    margin: 3px;
    border-radius: 6px;
    border: none;
    width: 100%;
}

button {
    padding: 6px 10px;
    border-radius: 6px;
    border: none;
    cursor: pointer;
}

.save {
    background: #00c853;
    color: white;
}

.delete {
    background: red;
    color: white;
}
</style>
</head>

<body>

<h2>📅 Admin Panel</h2>
<a href="/logout">Logout</a>

{% for day in days %}

<div class="day" onclick="toggle({{ loop.index }})">

    📆 {{ day.date }} ({{ day.bookings|length }} ραντεβού)

    <div class="box" id="box{{ loop.index }}">

        {% if day.bookings %}

            {% for b in day.bookings %}

            <div class="item">

                <!-- EDIT FORM -->
                <form method="POST" action="/admin/edit/{{ b.index }}">

                    <input name="name" value="{{ b.name }}" placeholder="Όνομα">
                    <input name="phone" value="{{ b.phone }}" placeholder="Τηλέφωνο">

                    <select name="service">
                        <option {% if b.service=="Κούρεμα" %}selected{% endif %}>Κούρεμα</option>
                        <option {% if b.service=="Μούσι" %}selected{% endif %}>Μούσι</option>
                        <option {% if b.service=="Κούρεμα + Μούσι" %}selected{% endif %}>Κούρεμα + Μούσι</option>
                    </select>

                    {% set parts = b.time.split(' ') %}

                    <input type="date" name="date" value="{{ parts[0] }}">
                    <input type="time" name="time" value="{{ parts[1] }}">

                    <button type="submit" class="save">💾 Save</button>

                </form>

                <!-- DELETE -->
                <a href="/admin/delete/{{ b.index }}">
                    <button class="delete">❌ Delete</button>
                </a>

            </div>

            {% endfor %}

        {% else %}
            <p>❌ Κανένα ραντεβού</p>
        {% endif %}

    </div>
</div>

{% endfor %}

<script>
function toggle(id){
    let box = document.getElementById("box"+id);

    if (box.style.display === "block") {
        box.style.display = "none";
    } else {
        box.style.display = "block";
    }
}
</script>

</body>
</html>
