<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
    margin: 0;
    background: #111;
    color: white;
    font-family: Arial;
}

.container {
    padding: 15px;
}

h2 {
    text-align: center;
}

/* DATE PICKER */
input[type="date"] {
    width: 100%;
    padding: 15px;
    font-size: 18px;
    margin-bottom: 15px;
}

/* CARD STYLE */
.card {
    background: #222;
    padding: 15px;
    border-radius: 12px;
    margin-bottom: 10px;
}

.card p {
    margin: 5px 0;
    font-size: 18px;
}

/* DELETE BUTTON */
.delete {
    background: red;
    padding: 10px;
    text-align: center;
    border-radius: 8px;
    color: white;
    text-decoration: none;
    display: block;
    margin-top: 10px;
}
</style>
</head>

<body>

<div class="container">

<h2>📅 Ραντεβού</h2>

<a href="/logout" style="color:red;">Logout</a>

<input type="date" id="filterDate">

<div id="appointments">

{% for a in data %}
<div class="card" data-date="{{ a.time.split(' ')[0] }}">
    <p><b>{{ a.name }}</b></p>
    <p>{{ a.phone }}</p>
    <p>{{ a.service }}</p>
    <p>{{ a.time }}</p>

    <a class="delete" href="/cancel/{{ loop.index0 }}">❌ Διαγραφή</a>
</div>
{% endfor %}

</div>

</div>

<script>
const dateInput = document.getElementById("filterDate");
const cards = document.querySelectorAll(".card");

dateInput.addEventListener("change", () => {
    const selected = dateInput.value;

    cards.forEach(card => {
        if (card.getAttribute("data-date") === selected || selected === "") {
            card.style.display = "block";
        } else {
            card.style.display = "none";
        }
    });
});
</script>

</body>
</html>
