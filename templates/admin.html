<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
    font-family: Arial;
    background: #111;
    color: white;
    padding: 10px;
}

.day {
    padding: 12px;
    margin-bottom: 10px;
    background: #1c1c1c;
    border-radius: 10px;
    cursor: pointer;
}

.day:hover {
    background: #2a2a2a;
}

.box {
    display: none;
    margin-top: 10px;
}

.item {
    background: #2a2a2a;
    padding: 10px;
    border-radius: 8px;
    margin-bottom: 6px;
}

button {
    padding: 5px 8px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
}

.delete {
    background: red;
    color: white;
}
</style>
</head>

<body>

<h2>📅 Admin Panel</h2>
<a href="/logout">Logout</a>

{% for day in days %}

<div class="item">

    <form method="POST" action="/admin/edit/{{ b.index }}">

        <input name="name" value="{{ b.name }}">
        <input name="phone" value="{{ b.phone }}">

        <select name="service">
            <option {% if b.service=="Κούρεμα" %}selected{% endif %}>Κούρεμα</option>
            <option {% if b.service=="Μούσι" %}selected{% endif %}>Μούσι</option>
            <option {% if b.service=="Κούρεμα + Μούσι" %}selected{% endif %}>Κούρεμα + Μούσι</option>
        </select>

        {% set parts = b.time.split(' ') %}

        <input type="date" name="date" value="{{ parts[0] }}">
        <input type="time" name="time" value="{{ parts[1] }}">

        <button type="submit">💾 Save</button>

    </form>

    <br>

    <a href="/admin/delete/{{ b.index }}">
        <button class="delete">❌ Delete</button>
    </a>

</div>

{% endfor %}

<script>
function toggle(id){
    let box = document.getElementById("box"+id);
    box.style.display = (box.style.display === "block") ? "none" : "block";
}
</script>

</body>
</html>
