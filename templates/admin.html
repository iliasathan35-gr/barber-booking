<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
    font-family: Arial;
    background: #111;
    color: white;
    padding: 10px;
}

h2 {
    text-align: center;
}

.day {
    margin-bottom: 20px;
    background: #1c1c1c;
    padding: 12px;
    border-radius: 12px;
}

.slot {
    padding: 8px;
    margin: 6px 0;
    border-radius: 8px;
    background: #2a2a2a;
    display: flex;
    flex-direction: column;
}

.booked {
    background: #00c853;
    color: black;
    font-weight: bold;
}

form {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
    margin-top: 5px;
}

input, select {
    padding: 6px;
    border-radius: 6px;
    border: none;
}

button {
    padding: 6px 10px;
    border: none;
    border-radius: 6px;
    background: #00c853;
    color: white;
    cursor: pointer;
}

.logout {
    display: block;
    text-align: center;
    margin-bottom: 10px;
    color: white;
}
</style>
</head>

<body>

<h2>📅 Admin Panel</h2>

<a href="/logout" class="logout">Logout</a>

{% for day in days %}
<div class="day">

<h3>{{ day.date }}</h3>

{% if day.slots %}
    {% for s in day.slots %}
        <div class="slot {% if s.booking %}booked{% endif %}">

            <strong>{{ s.time }}</strong>

            {% if s.booking %}
                <div>
                    {{ s.booking.name }} - {{ s.booking.phone }}<br>
                    {{ s.booking.service }}
                </div>
            {% else %}
                
                <!-- ADD BOOKING -->
                <form method="POST" action="/admin/add">

                    <input type="hidden" name="date" value="{{ day.date }}">
                    <input type="hidden" name="time" value="{{ s.time }}">

                    <input name="name" placeholder="Όνομα" required>
                    <input name="phone" placeholder="Τηλ" required>

                    <select name="service">
                        <option>Κούρεμα</option>
                        <option>Μούσι</option>
                        <option>Κούρεμα + Μούσι</option>
                    </select>

                    <button type="submit">➕</button>

                </form>

            {% endif %}

        </div>
    {% endfor %}
{% else %}
    <p>❌ Κλειστά</p>
{% endif %}

</div>
{% endfor %}

</body>
</html>
