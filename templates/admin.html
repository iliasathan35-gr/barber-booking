<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <title>Admin Panel</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #111;
            color: #fff;
            margin: 0;
            padding: 20px;
        }

        h1 {
            text-align: center;
            margin-bottom: 20px;
        }

        .day {
            background: #1c1c1c;
            padding: 15px;
            margin-bottom: 12px;
            border-radius: 12px;
            cursor: pointer;
        }

        .day-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .slots, .bookings {
            margin-top: 10px;
        }

        .slot {
            display: inline-block;
            background: #333;
            padding: 5px 10px;
            margin: 3px;
            border-radius: 6px;
            font-size: 14px;
        }

        .booking {
            background: #2a2a2a;
            padding: 10px;
            margin: 5px 0;
            border-radius: 8px;
        }

        .btn {
            padding: 5px 8px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin-left: 5px;
        }

        .edit {
            background: #f0ad4e;
        }

        .delete {
            background: #d9534f;
            color: white;
        }

        .book {
            background: #5cb85c;
            color: white;
        }
    </style>
</head>

<body>

<h1>💈 Admin Panel</h1>

{% for day in days %}

<div class="day">

    <!-- 📅 Ημερομηνία -->
    <div class="day-title">
        {{ day.label }}
    </div>

    <!-- ⏰ Slots -->
    <div class="slots">
        {% for slot in day.slots %}
            <span class="slot">{{ slot }}</span>
        {% endfor %}
    </div>

    <!-- 📌 Bookings -->
    <div class="bookings">
        {% for b in day.bookings %}
            <div class="booking">
                <b>{{ b.name }}</b> - {{ b.phone }} <br>
                {{ b.service }} <br>
                🕒 {{ b.time }}

                <!-- buttons -->
                <a class="btn edit" href="/admin/edit/{{ b.index }}">Edit</a>
                <a class="btn delete" href="/admin/delete/{{ b.index }}">Delete</a>
            </div>
        {% endfor %}
    </div>

</div>

{% endfor %}

</body>
</html>
